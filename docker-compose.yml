services:
  database:
    image: alpine:3.19
    command: ["sh", "-c", "mkdir -p /data && touch /data/logs.db /data/xpulse.db && tail -f /dev/null"]
    volumes:
      - cyberagent-data:/data

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      XPULSE_SECRET: change-this-secret
      XPULSE_DB_PATH: /app/data/xpulse.db
      CYBERAGENT_DB_PATH: /app/data/logs.db
    ports:
      - "8000:8000"
    volumes:
      - cyberagent-data:/app/data
    depends_on:
      - database

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  cyberagent-data:

